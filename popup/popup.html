<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perplexity Limits</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="shell">
    <header>
      <div class="brand">
        <svg class="brand-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="10" stroke="url(#grad1)" stroke-width="1.5"/>
          <path d="M8 12l3 3 5-5" stroke="url(#grad2)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <defs>
            <linearGradient id="grad1" x1="2" y1="2" x2="22" y2="22" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#38bdf8"/>
              <stop offset="100%" stop-color="#818cf8"/>
            </linearGradient>
            <linearGradient id="grad2" x1="8" y1="9" x2="16" y2="15" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#38bdf8"/>
              <stop offset="100%" stop-color="#4ade80"/>
            </linearGradient>
          </defs>
        </svg>
        <div>
          <div class="brand-title">Perplexity Limits</div>
          <div class="brand-sub" id="fetchedAt">Loading…</div>
        </div>
      </div>
      <button class="refresh-btn" id="refreshBtn" title="Refresh now">
        <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 4.5A7 7 0 0 1 17 10M16 15.5A7 7 0 0 1 3 10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          <path d="M17 6.5V10h-3.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M3 13.5V10h3.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </header>

    <div class="error-banner" id="errorBanner" hidden>
      <span>⚠️ Could not fetch limits. Make sure you’re logged in to Perplexity.</span>
    </div>

    <section class="core-grid" id="coreGrid"></section>

    <div class="divider-label">Connected source quotas</div>

    <section class="sources-section" id="sourcesSection"></section>

    <footer>
      Data from <code>perplexity.ai/rest/rate-limit/all</code> · local only
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
